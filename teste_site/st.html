<!DOCTYPE html>
<html lang="en">
<head>
    <title>teste</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body,html{
            height: 100%;
        }
    </style>
   
   
</head>

<body>

    <div>

        <input type="text" id="pesquisa" placeholder="buscar usuarios">

        <button> pesquisar </button>

    </div>

    <div id="usuarios">

    </div>
   
    
    


    <script>

        const usuarioss = document.getElementById ("usuarios");
        const pesquisa= document.getElementById ("pesquisa");

        let guardaAi = []

        async function buscarUsers(){

            try{

            const rps = await fetch ("https://api-9-mt0n.onrender.com/usuarios")
             
            const dados = await rps.json()

            users = dados

            mostrarUsers(users)

        } catch (erro){

            alert("erro na api", erro)
        }
        
    }

    function mostrarUsers(Lista) {

        usuarioss.innerHTML = ''

        Lista.array.forEach(usuarios => {

            usuarioss.innerHTML +=  
            `
            <div class="card">

                <h3>${usuarios.nome}</h3>
                <h3>${usuarios.id}</h3>
                <h3>${usuarios.email}</h3>
                <h3>${usuarios.telefone}</h3>



            </div>
            
            `
            
        });
    }

    pesquisa.addEventListener ('input', () => {

        const tx = pesquisa.value.toLowerCase()

        const filtro = usuarioss.filter (usuarios =>
            usuarios.nome.toLowerCase().includes(tx),
            usuarios.id.toLowerCase().includes(tx)
        )

        mostrarUsers(filtro)

    });

    buscarUsers()



        
    </script>
    
</body>
</html>
