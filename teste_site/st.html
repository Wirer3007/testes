<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>teste</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        

        
    </style>
</head>

<body>

    <div>
        <input type="text" id="pesquisa" placeholder="buscar usuarios">
        <button onclick="buscarUsers()">Pesquisar</button>
    </div>

    <div id="usuarios"></div>

    <script>

        const pesquisa = document.getElementById("pesquisa");

        let guardaAi = [];

        async function buscarUsers() {

            try {

                const rps = await fetch("https://api-9-mt0n.onrender.com/usuarios");

                const dados = await rps.json();

                guardaAi = dados;

                mostrarUsers(guardaAi);

            } catch (erro) {

                console.log("Erro:", erro);

            }

        }

        function mostrarUsers(lista) {

            const usuarioss = document.getElementById("usuarios");

            usuarioss.innerHTML = '';

            lista.forEach(usuario => {

                usuarioss.innerHTML += `
                    <div class="card">

                        <h3>${usuario.nome}</h3>
                        <h3>${usuario.id}</h3>
                        <h3>${usuario.email}</h3>
                        <h3>${usuario.telefone}</h3>

                    </div>
                `;

            });

        }

        pesquisa.addEventListener('input', () => {

            const tx = pesquisa.value.toLowerCase();

            const filtro = guardaAi.filter(usuario =>

                usuario.nome.toLowerCase().includes(tx) ||
                usuario.id.toString().includes(tx)

            );

            mostrarUsers(filtro);

        });

        buscarUsers();

    </script>

</body>
</html>
